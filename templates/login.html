<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>ClassRise — Вход</title>
  <style>
    body { font-family: 'Courier New', Courier, monospace; max-width: 400px; margin: 50px auto; padding: 0 15px; background: #121212; color: #e0e0e0; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; color: #aaa; }
    input { width: 100%; padding: 8px; box-sizing: border-box; background: #000; color: #fff; border: 1px solid #555; }
    button { padding: 10px 20px; background: #3498db; color: white; border: none; cursor: pointer; font-family: inherit; }
    button:hover { background: #2980b9; }
    a { color: #55aaff; text-decoration: none; }
    .error { color: #ff5555; margin-top: 10px; }
  </style>
</head>
<body>
  <h1 style="color: #ffd700;">ClassRise: Вход</h1>
  <div class="form-group">
    <label>Имя персонажа (для входа)</label>
    <input type="text" id="playerName" placeholder="Введите имя существующего игрока" />
  </div>
  <button onclick="doLogin()">Войти</button>
  <p style="margin-top:20px;">Нет аккаунта? <a href="/register-page">Регистрация</a></p>

  <script>
    async function doLogin() {
      const name = document.getElementById('playerName').value.trim();
      if (!name) return alert('Введите имя');

      const res = await fetch('/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name})
      });

      if (res.ok) {
        const data = await res.json();
        alert('Успешный вход! Перехожу в игру...');
        window.location.href = '/';
      } else {
        const err = await res.json().catch(() => ({}));
        alert(err.error || 'Ошибка входа');
      }
    }
  </script>
</body>
</html>
