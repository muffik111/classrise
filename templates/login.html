<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Вход в RPG</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 400px; margin: 40px auto; padding: 0 15px; }
    input, button { padding: 8px; width: 100%; box-sizing: border-box; margin-bottom: 12px; }
    button { background: #3498db; color: white; border: none; cursor: pointer; }
    .error { color: red; }
  </style>
</head>
<body>
  <h2>Вход в игру</h2>
  <input id="name" type="text" placeholder="Никнейм" />
  <button onclick="login()">Войти</button>
  <p id="msg" class="error"></p>

  <script>
    async function login() {
      const name = document.getElementById('name').value.trim();
      const msgEl = document.getElementById('msg');
      msgEl.textContent = '';

      if (!name) return (msgEl.textContent = 'Введите ник');

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({name})
        });

        const data = await res.json();

        if (!res.ok || data.error) {
          msgEl.textContent = data.error || 'Ошибка входа';
          return;
        }

        // ГЛАВНОЕ: мы не делаем редирект через HTTP.
        // Мы открываем game.html через JS и передаём туда данные игрока.
        const gameWindow = window.open('game.html', '_self');
        
        // Небольшая задержка, чтобы game.html успел загрузиться и объявить window.initGame
        setTimeout(() => {
          if (gameWindow && !gameWindow.closed) {
            gameWindow.initGame(data);
          } else {
            alert('Не удалось открыть игровой экран. Попробуйте обновить страницу.');
          }
        }, 200);

      } catch (e) {
        msgEl.textContent = 'Ошибка сети: ' + e.message;
      }
    }
  </script>
</body>
</html>
