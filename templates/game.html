<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>ClassRise — Игровой процесс</title>
  <style>
    body { font-family: 'Courier New', Courier, monospace; max-width: 900px; margin: 20px auto; padding: 0 15px; background: #121212; color: #e0e0e0; }
    .section { border: 1px solid #444; padding: 15px; margin-bottom: 20px; border-radius: 8px; background: #1e1e1e; }
    h3 { margin-top: 0; color: #ffd700; border-bottom: 1px solid #555; padding-bottom: 5px; }
    
    button { padding: 8px 16px; cursor: pointer; margin-right: 8px; background: #3498db; color: white; border: none; border-radius: 4px; font-family: inherit; }
    button:hover { background: #2980b9; }
    button:disabled { background: #555; cursor: not-allowed; }
    input, select { padding: 6px; margin-right: 8px; border: 1px solid #555; background: #000; color: #fff; }

    /* Кнопка ВЫЙТИ — отдельный стиль */
    .btn-logout {
      background: #c0392b;
      float: right;
      margin-bottom: 10px;
    }
    .btn-logout:hover { background: #a93226; }
    
    .log { background: #000; padding: 10px; border: 1px solid #333; min-height: 100px; font-family: monospace; white-space: pre-wrap; color: #0f0; overflow-y: auto; max-height: 200px; }
    
    #chat-panel {
      margin-top: 24px;
      padding: 10px;
      border: 1px solid #666;
      background: #1a1a1d;
      border-radius: 6px;
    }
    #chat-messages {
      height: 300px; /* Чуть выше, чтобы было просторнее */
      overflow-y: auto;
      background: #000;
      padding: 8px;
      color: #ccc;
      font-family: monospace;
      border: 1px solid #333;
      margin-bottom: 8px;
      box-sizing: border-box;
    }
    .chat-time { color: #555; font-size: 0.8em; margin-left: 10px; }
    .chat-sender-sys { color: #aaa; }
    .chat-sender-player { color: #ddd; }
    .chat-text { color: #fff; }
  </style>
</head>
<body>

  <h1 style="color: #ffd700;">ClassRise: Текстовая MMORPG</h1>

  <!-- КНОПКА ВЫЙТИ -->
  <button class="btn-logout" onclick="logout()">Выйти из игры</button>

  <!-- Статус героя (БЕЗ инвентаря) -->
  <div class="section">
    <h3>Статус героя</h3>
    <button onclick="loadStatus()" id="btn-status">Обновить статус</button>
    <div id="statusBox"></div>
  </div>

  <!-- Бой -->
  <div class="section">
    <h3>Бой</h3>
    <p>Сразитесь с обычным мобом (HP: 50). Механика: вы бьёте → моб бьёт в ответ.</p>
    <button onclick="startFight()" id="btn-fight">Атаковать моба!</button>
    <div id="fightLog" class="log"></div>
  </div>

  <!-- ЧАТ -->
  <div id="chat-panel">
    <h4 style="margin: 0 0 8px 0; color: #888;">Общий чат</h4>
    <div id="chat-messages"></div>
    <div style="display: flex; gap: 8px;">
      <input type="text" id="chat-input" placeholder="Сообщение (Enter для отправки)" style="flex: 1; padding: 6px; border: 1px solid #555; background: #222; color: #fff;">
      <button id="chat-send" style="padding: 6px 12px; background: #333; color: #fff; border: none; cursor: pointer;">Отправить</button>
    </div>
  </div>

  <script>
    let currentPlayer = null;
    const chatMessagesBox = document.getElementById('chat-messages');
    const chatInput = document.getElementById('chat-input');
    const chatSendBtn = document.getElementById('chat-send');

    document.addEventListener('DOMContentLoaded', () => {
      console.log("Загрузка game.html...");
      loadStatus(); 
      loadChatMessages();
    });

    function addChatMessage(sender, text, isSystem = false) {
      const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      const prefix = isSystem ? '[СИСТЕМА]' : `[${sender}]`;
      const colorClass = isSystem ? 'chat-sender-sys' : 'chat-sender-player';
      // Защита от XSS
      const safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");

      const div = document.createElement('div');
      div.innerHTML = `
        <span class="${colorClass}">${prefix}</span>
        <span class="chat-text">${safeText}</span>
        <span class="chat-time">(${time})</span>
      `;
      chatMessagesBox.appendChild(div);
      chatMessagesBox.scrollTop = chatMessagesBox.scrollHeight;
    }

    async function apiRequest(endpoint, method = 'GET', data = null) {
      const options = { method };
      if (data) {
        options.headers = {'Content-Type': 'application/json'};
        options.body = JSON.stringify(data);
      }
      
      try {
        const res = await fetch(endpoint, options);
        
        if (res.status === 401) {
          addChatMessage('СИСТЕМА', 'Сессия истекла! Перенаправление на вход...', true);
          setTimeout(() => window.location.href = '/login-page', 1500);
          return null;
        }

        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.error || `Ошибка сервера: ${res.status}`);
        }
        return await res.json();
      } catch (e) {
        console.error("API Error:", e);
        addChatMessage('СИСТЕМА', e.message || 'Ошибка соединения с сервером', true);
        return null;
      }
    }

    // --- ЛОГАУТ (ВЫХОД) ---
    async function logout() {
      try {
        await fetch('/logout', { method: 'POST' });
      } catch (e) {
        // Если роута нет — просто игнорируем ошибку
      } finally {
        currentPlayer = null;
        window.location.href = '/login-page';
      }
    }

    // --- ЗАГРУЗКА СТАТУСА (БЕЗ ИНВЕНТАРЯ) ---
    async function loadStatus() {
      const statusBox = document.getElementById('statusBox');
      statusBox.innerHTML = '<p>Загрузка статуса...</p>';
      
      const data = await apiRequest('/player-status');
      if (!data) return; 

      // ГЛАВНОЕ: теперь НЕ берем inventory из данных
      currentPlayer = {
        char_id: data.id,
        name: data.name,
        class: data.class,
        level: data.level,
        adenas: data.adenas,
        exp: data.exp,
        next_level_exp: data.next_level_exp,
        current_hp: data.current_hp,
        max_hp: data.max_hp,
        attack: data.attack,
        defense: data.defense
      };

      let hpPercent = Math.max(0, Math.min(100, data.current_hp / data.max_hp * 100));
      let hpColor = data.current_hp > 0 ? '#ff4444' : 'red';

      let html = `
        <p><b>Имя:</b> ${data.name} | <b>Класс:</b> ${data.class} | <b>Ур:</b> ${data.level}</p>
        <p><b>EXP:</b> ${data.exp} / ${data.next_level_exp || 100} | <b>Адены:</b> ${data.adenas}</p>
        <div style="width:200px; background:#333; border:1px solid #555;">
           <div style="width:${hpPercent}% ; height:20px; background:${hpColor};"></div>
        </div>
        <p><b>HP:</b> ${data.current_hp}/${data.max_hp} | <b>ATK:</b> ${data.attack} | <b>DEF:</b> ${data.defense}</p>
      `;
      statusBox.innerHTML = html;
    }

    // --- БОЙ ---
    async function startFight() {
      const log = document.getElementById('fightLog');
      log.textContent = 'Вы замахиваетесь...';
      
      if (!currentPlayer) {
        log.textContent = 'Ошибка: Нет данных игрока. Обновите страницу.';
        return;
      }

      const result = await apiRequest('/fight', 'POST', { char_id: currentPlayer.char_id });

      if (!result) return;

      let msg = `Вы нанесли ${result.damage_done} урона.`;
      if (result.is_mob_dead) msg += ' <b>Моб убит!</b>';
      msg += ` Вы получили ${result.damage_received} урона.\n`;
      msg += `Ваш HP: ${result.player_hp}. HP моба: ${result.mob_hp}.`;

      log.innerHTML = msg;
      setTimeout(loadStatus, 500); 
    }

    chatSendBtn.addEventListener('click', sendChat);
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendChat();
    });

    // --- ОТПРАВКА ЧАТА ---
    async function sendChat() {
      const text = chatInput.value.trim();
      if (!text) return;
      
      if (!currentPlayer || typeof currentPlayer.char_id === 'undefined') {
        addChatMessage('СИСТЕМА', 'Сначала войдите в игру и дождитесь загрузки статуса!', true);
        return;
      }

      chatSendBtn.disabled = true;
      chatInput.disabled = true;

      try {
        const res = await fetch('/chat-send', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ 
            char_id: currentPlayer.char_id, 
            text: text 
          })
        });

        if (res.ok) {
          chatInput.value = '';
          loadChatMessages(); 
        } else {
          const err = await res.json().catch(() => ({}));
          addChatMessage('СИСТЕМА', err.error || 'Не удалось отправить сообщение', true);
        }
      } catch (e) {
        addChatMessage('СИСТЕМА', 'Ошибка сети', true);
      } finally {
        chatSendBtn.disabled = false;
        chatInput.disabled = false;
      }
    }

    // --- ЗАГРУЗКА ИСТОРИИ ЧАТА ---
    async function loadChatMessages() {
      const data = await apiRequest('/chat-history?limit=30');
      
      if (!data || !Array.isArray(data)) {
        return;
      }

      chatMessagesBox.innerHTML = '';
      data.forEach(msg => {
        const sender = msg.player_name || msg.name || 'Unknown';
        const text = msg.text || msg.message || '';
        addChatMessage(sender, text, false);
      });
    }
  </script>
</body>
</html>
