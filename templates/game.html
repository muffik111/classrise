<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>RPG — Игровой процесс</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 0 15px; }
    .section { border: 1px solid #ccc; padding: 12px; margin-bottom: 16px; border-radius: 6px; }
    button { padding: 8px 14px; cursor: pointer; margin-right: 6px; background: #3498db; color: white; border: none; }
    button:hover { background: #2980b9; }
    input, select { padding: 6px; margin-right: 8px; }
    .log { background: #f5f5f5; padding: 10px; border: 1px solid #ddd; min-height: 80px; font-family: monospace; white-space: pre-wrap; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { border: 1px solid #ccc; padding: 4px 6px; text-align: left; }
    .error { color: red; }

    /* Стили чата (Lineage-style) */
    #chat-panel {
      margin-top: 24px;
      padding: 10px;
      border: 1px solid #444;
      background: #1a1a1d;
      border-radius: 6px;
    }
    #chat-messages {
      height: 180px;
      overflow-y: auto;
      background: #000;
      padding: 8px;
      color: #ccc;
      font-family: monospace;
      border: 1px solid #333;
      margin-bottom: 8px;
    }
    .chat-time { color: #555; font-size: 0.85em; margin-left: 8px; }
    .chat-sender-sys { color: #aaa; }
    .chat-sender-player { color: #ddd; }
    .chat-text { color: #fff; }
  </style>
</head>
<body>
  <!-- Если сюда зашли без авторизации, кидаем на логин -->
  <script>
    if (!localStorage.getItem('player_id')) {
      window.location.href = '/login.html';
    }
  </script>

  <h1>RPG в стиле Lineage 2</h1>

  <!-- Статус и инвентарь -->
  <div class="section">
    <h3>Статус героя</h3>
    <button onclick="getStatus()">Обновить статус</button>
    <div id="statusBox"></div>
  </div>

  <!-- Бой -->
  <div class="section">
    <h3>Бой</h3>
    <button onclick="fight()">Сразиться с мобом</button>
    <div id="fightLog" class="log"></div>
  </div>

  <!-- Магазин (список предметов) -->
  <div class="section">
    <h3>Магазин (предметы)</h3>
    <p>ID предмета = его номер в базе (1–7).</p>
    <table>
      <thead>
        <tr><th>ID</th><th>Название</th><th>Тип</th><th>Бонус ATK</th><th>Бонус DEF</th><th>Цена (Адены)</th></tr>
      </thead>
      <tbody id="shopTableBody"></tbody>
    </table>
  </div>

  <!-- Надевание предметов -->
  <div class="section">
    <h3>Экипировка</h3>
    <p><strong>Важно:</strong> предмет должен быть в инвентаре.</p>
    <label>ID оружия:</label>
    <input type="number" id="equipWeaponId" placeholder="например 2" />
    <button onclick="equipItem('weapon')">Надеть оружие</button>
    <br /><br />
    <label>ID брони:</label>
    <input type="number" id="equipArmorId" placeholder="например 5" />
    <button onclick="equipItem('armor')">Надеть броню</button>
    <div id="equipLog" class="log"></div>
  </div>

  <!-- Лог ошибок -->
  <div class="section">
    <h3>Лог</h3>
    <div id="globalLog" class="log"></div>
  </div>

  <!-- ЧАТ (новый блок) -->
  <div id="chat-panel">
    <h4 style="margin: 0 0 8px 0; color: #ddd;">Общий чат</h4>
    <div id="chat-messages"></div>
    <div style="display: flex; gap: 8px;">
      <input type="text" id="chat-input" placeholder="Сообщение (Enter для отправки)" style="flex: 1; padding: 6px; border: 1px solid #555; background: #222; color: #fff;">
      <button id="chat-send" style="padding: 6px 12px; background: #333; color: #fff; border: none; cursor: pointer;">Отправить</button>
    </div>
  </div>

  <script>
    const API_URL = '';
    let currentPlayerId = localStorage.getItem('player_id');

    async function apiPost(endpoint, data) {
      const res = await fetch(API_URL + endpoint, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      });
      return await res.json();
    }

    // Статус
    async function getStatus() {
      const statusBox = document.getElementById('statusBox');
      const log = document.getElementById('globalLog');

      if (!currentPlayerId) {
        statusBox.innerHTML = '<span class="error">Сначала войдите в игру!</span>';
        return;
      }

      try {
        const r = await apiPost('/status', {player_id: currentPlayerId});

        if (r.error) {
          statusBox.innerHTML = '<span class="error">' + r.error + '</span>';
          return;
        }

        let html = `
          <p><b>Имя:</b> ${r.name} | <b>Класс:</b> ${r.class} | <b>Ур:</b> ${r.level}</p>
          <p><b>EXP:</b> ${r.exp}/${r.next_level_exp} | <b>Адены:</b> ${r.aden}</p>
          <p><b>HP:</b> ${r.current_hp}/${r.max_hp} | <b>ATK:</b> ${r.attack} | <b>DEF:</b> ${r.defense}</p>
          <p><b>Экипировка:</b> Оружие=${r.equipment.weapon}, Броня=${r.equipment.armor}</p>
          <p><b>Инвентарь:</b> [${r.inventory.join(', ') || 'пусто'}]</p>
        `;
        statusBox.innerHTML = html;
        log.textContent = '';
      } catch (e) {
        log.textContent = 'Ошибка статуса: ' + e.message;
      }
    }

    // Бой
    async function fight() {
      const log = document.getElementById('fightLog');
      if (!currentPlayerId) {
        log.textContent = 'Сначала войдите в игру!';
        return;
      }
      try {
        const r = await apiPost('/fight', {player_id: currentPlayerId});
        log.textContent = r.message || JSON.stringify(r, null, 2);
      } catch (e) {
        log.textContent = 'Ошибка боя: ' + e.message;
      }
    }

    // Магазин
    function loadShop() {
      const items = {
        1: {"name": "Ржавый меч", "type": "weapon", "bonus_attack": 5, "bonus_defense": 0, "price": 100},
        2: {"name": "Стальной клинок", "type": "weapon", "bonus_attack": 12, "bonus_defense": 0, "price": 250},
        3: {"name": "Лук новичка", "type": "weapon", "bonus_attack": 8, "bonus_defense": 0, "price": 180},
        4: {"name": "Деревянный щит", "type": "armor", "bonus_attack": 0, "bonus_defense": 6, "price": 150},
        5: {"name": "Тяжёлый стальной щит", "type": "armor", "bonus_attack": 0, "bonus_defense": 14, "price": 320},
        6: {"name": "Кожаная броня", "type": "armor", "bonus_attack": 0, "bonus_defense": 8, "price": 200},
        7: {"name": "Кольчуга", "type": "armor", "bonus_attack": 0, "bonus_defense": 16, "price": 400},
      };
      const tbody = document.getElementById('shopTableBody');
      tbody.innerHTML = '';
      Object.entries(items).forEach(([id, item]) => {
        tbody.insertAdjacentHTML('beforeend', `
          <tr>
            <td>${id}</td>
            <td>${item.name}</td>
            <td>${item.type}</td>
            <td>${item.bonus_attack}</td>
            <td>${item.bonus_defense}</td>
            <td>${item.price}</td>
          </tr>
        `);
      });
    }

    // Надевание предмета
    async function equipItem(slot) {
      if (!currentPlayerId) {
        document.getElementById('equipLog').textContent = 'Сначала войдите в игру!';
        return;
      }
      const idInput = document.getElementById(slot === 'weapon' ? 'equipWeaponId' : 'equipArmorId');
      const itemId = Number(idInput.value);
      const log = document.getElementById('equipLog');

      if (!itemId || itemId <= 0) {
        log.textContent = 'Введите корректный ID предмета.';
        return;
      }

      try {
        const r = await apiPost('/equip', {player_id: currentPlayerId, item_id: itemId, slot: slot});
        log.textContent = r.success ? r.message : ('Ошибка: ' + (r.message || JSON.stringify(r)));
        setTimeout(getStatus, 500);
      } catch (e) {
        log.textContent = 'Ошибка при надевании: ' + e.message;
      }
    }

    // --- ЧАТ: логика (безопасная инициализация) ---
    function initChat() {
      const chatMessagesBox = document.getElementById('chat-messages');
      const chatInput = document.getElementById('chat-input');
      const chatSendBtn = document.getElementById('chat-send');

      // Если по какой-то причине элементы не нашлись — выходим, чтобы не ломать остальной JS
      if (!chatMessagesBox || !chatInput || !chatSendBtn) {
        console.error('Элементы чата не найдены в DOM — чат не будет работать.');
        return;
      }

      function addChatMessage(sender, text, isSystem = false) {
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const prefix = isSystem ? '[СИСТЕМА]' : `[${sender}]`;
        
        const div = document.createElement('div');
        div.innerHTML = `
          <span class="${isSystem ? 'chat-sender-sys' : 'chat-sender-player'}">${prefix}</span>
          <span class="chat-text">${text}</span>
          <span class="chat-time">(${time})</span>
        `;
        chatMessagesBox.appendChild(div);
        chatMessagesBox.scrollTop = chatMessagesBox.scrollHeight;
      }

      async function sendChat() {
        const text = chatInput.value.trim();
        if (!text || !currentPlayerId) return;

        try {
          const res = await fetch(API_URL + '/api/chat/send', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
              player_id: currentPlayerId,
              message: text
            })
          });
          if (!res.ok) throw new Error('Ошибка отправки');
          chatInput.value = '';
          // Можно добавить сообщение локально сразу, но лучше дождаться синхронизации с сервером
        } catch (e) {
          addChatMessage('СИСТЕМА', 'Не удалось отправить сообщение', true);
        }
      }

      async function fetchChatMessages() {
        try {
          const res = await fetch(`${API_URL}/api/chat/messages?player_id=${currentPlayerId}`);
          const data = await res.json();
          if (data.messages) {
            data.messages.forEach(msg => {
              addChatMessage(msg.sender, msg.text, msg.is_system || false);
            });
          }
        } catch (e) {
          // мелкие ошибки сети можно игнорировать
        } finally {
          setTimeout(fetchChatMessages, 3000); // опрос каждые 3 сек
        }
      }

      chatSendBtn.addEventListener('click', sendChat);
      chatInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendChat();
      });

      fetchChatMessages(); // старт опроса
    }

    // Запускаем чат только когда DOM полностью готов
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initChat);
    } else {
      initChat();
    }

    loadShop();
  </script>
</body>
</html>
